run:
  timeout: 5m

linters:
  enable:
    - errcheck
    - gosimple
    - govet
    - ineffassign
    - staticcheck
    - unused
    - misspell
    - unconvert

linters-settings:
  goimports:
    local-prefixes: github.com/opsdevcode/repave/operator

issues:
  max-issues-per-linter: 0
  max-same-issues: 0
