---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: manager-role
rules:
- apiGroups:
  - repave.dev
  resources:
  - goldenpathrepos
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - repave.dev
  resources:
  - goldenpathrepos/finalizers
  verbs:
  - update
- apiGroups:
  - repave.dev
  resources:
  - goldenpathrepos/status
  verbs:
  - get
  - patch
  - update
