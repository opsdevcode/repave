---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.17.2
  name: goldenpathrepos.repave.dev
spec:
  group: repave.dev
  names:
    kind: GoldenPathRepo
    listKind: GoldenPathRepoList
    plural: goldenpathrepos
    shortNames:
    - gpr
    singular: goldenpathrepo
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .status.phase
      name: Phase
      type: string
    - jsonPath: .spec.repoURL
      name: Repo
      type: string
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: GoldenPathRepo registers a generated repository for drift and
          upgrade reconciliation.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: GoldenPathRepoSpec defines a generated golden-path repository
              to reconcile.
            properties:
              desiredPins:
                description: DesiredPins are the target blueprint and standard versions
                  for this repo.
                properties:
                  blueprintName:
                    type: string
                  blueprintVersion:
                    type: string
                  standardSource:
                    type: string
                  standardVersion:
                    type: string
                required:
                - blueprintName
                - blueprintVersion
                - standardSource
                - standardVersion
                type: object
              localPath:
                description: LocalPath is an absolute filesystem path to a module
                  repo (local dev and envtest).
                type: string
              repoURL:
                description: RepoURL is the git remote (https or ssh). For local development
                  use LocalPath instead.
                type: string
            required:
            - desiredPins
            type: object
          status:
            description: GoldenPathRepoStatus defines the observed state of GoldenPathRepo.
            properties:
              message:
                description: Message is a human-readable detail string for the current
                  phase.
                type: string
              observedGeneration:
                description: ObservedGeneration reflects the metadata.generation last
                  reconciled.
                format: int64
                type: integer
              observedPins:
                description: ObservedPins holds pins read from repave.yaml when inventory
                  runs (slice 1+).
                properties:
                  blueprintName:
                    type: string
                  blueprintVersion:
                    type: string
                  standardSource:
                    type: string
                  standardVersion:
                    type: string
                type: object
              phase:
                description: Phase summarizes reconciliation state.
                type: string
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
