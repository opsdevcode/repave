---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.17.2
  name: blueprints.repave.dev
spec:
  group: repave.dev
  names:
    kind: Blueprint
    listKind: BlueprintList
    plural: blueprints
    shortNames:
    - bp
    singular: blueprint
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .spec.version
      name: Version
      type: string
    - jsonPath: .spec.standard.version
      name: Standard
      type: string
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: Blueprint mirrors repave catalog pin versions for fleet-wide
          desired state.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: BlueprintSpec defines catalog pin versions for a golden path
              blueprint.
            properties:
              standard:
                description: Standard pins the governance corpus applied at generation
                  time.
                properties:
                  source:
                    description: Source is the in-repo or URI path to the standard
                      corpus.
                    minLength: 1
                    type: string
                  version:
                    description: Version is the semver of the standard corpus.
                    minLength: 1
                    type: string
                required:
                - source
                - version
                type: object
              version:
                description: Version is the semver of the blueprint template.
                minLength: 1
                type: string
            required:
            - standard
            - version
            type: object
          status:
            description: BlueprintStatus records the last observed spec generation.
            properties:
              observedGeneration:
                description: ObservedGeneration reflects the metadata.generation last
