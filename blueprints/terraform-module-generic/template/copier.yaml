# Copier template metadata for terraform-module-generic
_min_copier_version: "9.0.0"
_templates_suffix: .jinja
_exclude:
  - copier.yaml

module_name:
  type: str
  help: Name of the Terraform module

description:
  type: str
  help: Short module description

cloud_provider:
  type: str
  help: Cloud provider this module targets (aws, azure, gcp)

provider_services:
  type: str
  help: Comma-separated provider services in scope

provider_service_scope:
  type: str
  help: JSON map of service resource scope (basic or custom)

provider_service_scope_summary:
  type: str
  help: Human-readable provider service scope summary
