apiVersion: repave.dev/v1alpha1
kind: Blueprint
metadata:
  name: terraform-module-generic
  version: 0.2.0
  description: Generic Terraform module scaffold with provider scope, tests, and CI wiring.
spec:
  standard:
    source: examples/standards
    version: 0.1.0
  inputs:
    - name: module_name
      type: string
      required: true
      description: Name of the Terraform module (e.g. networking-vnet).
    - name: description
      type: string
      required: true
      description: Short description of what the module does.
    - name: cloud_provider
      type: string
      required: true
      description: Cloud provider this module targets.
      enum:
        - aws
        - azure
        - gcp
      default: aws
    - name: provider_services
      type: string
      required: true
      description: Comma-separated list of provider services in scope (e.g. s3, vpc, iam).
  template:
    engine: copier
    path: template
  gates:
    - terraform-fmt
    - terraform-validate
    - tflint
    - checkov
    - docs-drift
  output:
    type: pull_request
    repository:
      name_template: "tf-{cloud_provider}-{module_name}"
      title_template: "Bootstrap {cloud_provider} module {module_name} ({provider_services})"
