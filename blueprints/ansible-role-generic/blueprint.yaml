apiVersion: repave.dev/v1alpha1
kind: Blueprint
metadata:
  name: ansible-role-generic
  version: 0.2.0
  description: Galaxy-compatible Ansible role scaffold with production-profile lint pack.
spec:
  artifactType: ansible-role
  standard:
    source: examples/standards/ansible
    version: 1.0.0
  inputs:
    - name: role_name
      type: string
      required: true
      description: Name of the Ansible role (e.g. webserver).
    - name: namespace
      type: string
      required: true
      description: Galaxy namespace for the role (e.g. acme).
    - name: description
      type: string
      required: true
      description: Short description of what the role does.
    - name: min_ansible_version
      type: string
      required: true
      description: Minimum supported Ansible version for this role.
      default: "2.15"
    - name: target_platforms
      type: string
      required: true
      description: >-
        Comma-separated Galaxy platforms as Name:version (e.g. EL:9,Ubuntu:jammy).
        Use Ansible Galaxy version codenames, not OS release numbers.
      default: "Ubuntu:jammy"
  template:
    engine: copier
    path: template
  gates:
    - yamllint
    - ansible-lint
    - ansible-syntax-check
    - secrets
    - molecule
    - docs-drift
    - provenance-drift
  ansible_lint:
    pack_source: examples/ansible-lint/pack
    pack_version: 1.0.0
  gate_config:
    ansible-lint:
      config_file: .ansible-lint
  output:
    type: pull_request
    provenance:
      file: repave.yaml
    repository:
      name_template: "ansible-role-{role_name}"
      title_template: "Bootstrap Ansible role {namespace}.{role_name}"
