name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: engine
    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/ci-paths
        id: paths

      - name: Docs-only change (skip tests)
        if: steps.paths.outputs.ci_needed != 'true'
        run: echo "No code changes outside docs-only paths; skipping test suite."

      - uses: astral-sh/setup-uv@v5
        if: steps.paths.outputs.ci_needed == 'true'
        with:
          enable-cache: true

      - uses: actions/setup-python@v5
        if: steps.paths.outputs.ci_needed == 'true'
        with:
          python-version: "3.12"

      - name: Install engine
        if: steps.paths.outputs.ci_needed == 'true'
        run: uv sync --extra dev --frozen

      - name: Install Ansible lint tooling
        if: steps.paths.outputs.ci_needed == 'true'
        run: pip install ansible-lint yamllint

      - name: Run tests
        if: steps.paths.outputs.ci_needed == 'true'
        run: uv run pytest
