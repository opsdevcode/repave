name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: engine
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install engine
        run: uv sync --extra dev --frozen

      - name: Install Ansible lint tooling
        run: pip install ansible-lint yamllint

      - name: Run tests
        run: uv run pytest
