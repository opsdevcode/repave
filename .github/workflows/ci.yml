name: CI

# Docs-only changes skip this workflow (see CONTRIBUTING.md).
on:
  push:
    branches: [main]
    paths-ignore:
      - "docs/**"
      - "**/*.md"
      - "LICENSE"
      - ".github/pull_request_template.md"
  pull_request:
    paths-ignore:
      - "docs/**"
      - "**/*.md"
      - "LICENSE"
      - ".github/pull_request_template.md"

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: engine
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install engine
        run: uv sync --extra dev --frozen

      - name: Install Ansible lint tooling
        run: pip install ansible-lint yamllint

      - name: Run tests
        run: uv run pytest
