name: Release

# Docs-only merges do not run the release job (see CONTRIBUTING.md).
on:
  push:
    branches: [main]
    paths-ignore:
      - "docs/**"
      - "**/*.md"
      - "LICENSE"
      - ".github/pull_request_template.md"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.REPAVE_RELEASE_TOKEN }}

      - name: Sync main branch ruleset (release bypass for administrators)
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.REPAVE_RELEASE_TOKEN }}
        run: |
          set -euo pipefail
          RULESET_ID="$(gh api "repos/${GITHUB_REPOSITORY}/rulesets" \
            --jq '.[] | select(.name=="main branch") | .id')"
          gh api --method PUT "repos/${GITHUB_REPOSITORY}/rulesets/${RULESET_ID}" \
            --input .github/rulesets/main-branch.json

      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: actions/setup-go@v5
        with:
          go-version-file: operator/go.mod

      - name: Install engine and semantic-release
        working-directory: engine
        run: |
          uv sync --extra dev --frozen
          uv pip install "python-semantic-release~=10.0"

      - name: Run engine tests
        working-directory: engine
        run: uv run pytest

      - name: Run operator tests
        working-directory: operator
        run: make test

      - name: Create GitHub release on conventional commits
        working-directory: engine
        env:
          GH_TOKEN: ${{ secrets.REPAVE_RELEASE_TOKEN }}
        run: uv run semantic-release version
