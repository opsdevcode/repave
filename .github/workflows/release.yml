name: Release

# Docs-only merges do not run the release job (see CONTRIBUTING.md).
on:
  push:
    branches: [main]
    paths-ignore:
      - "docs/**"
      - "**/*.md"
      - "LICENSE"
      - ".github/pull_request_template.md"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.REPAVE_RELEASE_TOKEN }}
          persist-credentials: false

      - name: Sync main branch ruleset (release bypass for administrators)
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.REPAVE_RELEASE_TOKEN }}
        run: |
          set -euo pipefail
          RULESET_ID="$(gh api "repos/${GITHUB_REPOSITORY}/rulesets" \
            --jq '.[] | select(.name=="main branch") | .id')"
          gh api --method PUT "repos/${GITHUB_REPOSITORY}/rulesets/${RULESET_ID}" \
            --input .github/rulesets/main-branch.json

      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: actions/setup-go@v5
        with:
          go-version-file: operator/go.mod

      - name: Install engine and semantic-release
        working-directory: engine
        run: |
          uv sync --extra dev --frozen
          uv pip install "python-semantic-release~=10.0"

      - name: Run engine tests
        working-directory: engine
        run: uv run pytest

      - name: Run operator tests
        working-directory: operator
        run: make test

      - name: Create GitHub release on conventional commits
        env:
          GH_TOKEN: ${{ secrets.REPAVE_RELEASE_TOKEN }}
          RELEASE_TOKEN: ${{ secrets.REPAVE_RELEASE_TOKEN }}
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git remote set-url origin "https://x-access-token:${RELEASE_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"

          publish_github_release() {
            local tag="$1"
            local version="${tag#v}"
            git fetch origin "refs/tags/${tag}:refs/tags/${tag}" 2>/dev/null || true
            git checkout "${tag}"
            cd engine
            uv build
            if gh release view "${tag}" >/dev/null 2>&1; then
              echo "GitHub release ${tag} already exists."
              cd "${GITHUB_WORKSPACE}"
              git fetch origin main
              git checkout -B main origin/main
              return 0
            fi
            gh release create "${tag}" dist/* \
              --title "repave-engine ${version}" \
              --generate-notes
            cd "${GITHUB_WORKSPACE}"
            git checkout -B main origin/main
          }

          git fetch origin main
          git checkout -B main origin/main

          LATEST_TAG="$(git tag -l 'v*' --sort=-v:refname | head -1 || true)"
          if [ -n "${LATEST_TAG}" ] && ! gh release view "${LATEST_TAG}" >/dev/null 2>&1; then
            echo "Repairing missing GitHub release for ${LATEST_TAG}."
            publish_github_release "${LATEST_TAG}"
            git fetch origin main
            git checkout -B main origin/main
          fi

          BEFORE="$(git rev-parse HEAD)"
          cd engine
          uv run semantic-release version --no-push --no-tag
          cd "${GITHUB_WORKSPACE}"
          AFTER="$(git rev-parse HEAD)"
          if [ "${BEFORE}" = "${AFTER}" ]; then
            echo "No release needed."
            exit 0
          fi

          VERSION="$(grep '^version =' engine/pyproject.toml | sed 's/version = "\(.*\)"/\1/')"
          TAG="v${VERSION}"
          BRANCH="chore/release-${VERSION}"
          RELEASE_SHA="$(git rev-parse HEAD)"

          git push origin "${RELEASE_SHA}:refs/heads/${BRANCH}"

          EXISTING="$(gh pr list --head "${BRANCH}" --base main --json number --jq '.[0].number // empty')"
          if [ -z "${EXISTING}" ]; then
            gh pr create --base main --head "${BRANCH}" \
              --title "chore(release): ${VERSION}" \
              --body "Automated semantic-release publish."
          fi

          gh pr merge "${BRANCH}" --merge --delete-branch --admin

          git fetch origin main
          git checkout -B main origin/main

          git tag -f "${TAG}" "${RELEASE_SHA}"
          git push origin "refs/tags/${TAG}" --force

          publish_github_release "${TAG}"
