name: Release

# Docs-only merges do not run the release job (see CONTRIBUTING.md).
on:
  push:
    branches: [main]
    paths-ignore:
      - "docs/**"
      - "**/*.md"
      - "LICENSE"
      - ".github/pull_request_template.md"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.REPAVE_RELEASE_TOKEN }}
          persist-credentials: false

      - name: Sync main branch ruleset (release bypass for administrators)
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.REPAVE_RELEASE_TOKEN }}
        run: |
          set -euo pipefail
          RULESET_ID="$(gh api "repos/${GITHUB_REPOSITORY}/rulesets" \
            --jq '.[] | select(.name=="main branch") | .id')"
          gh api --method PUT "repos/${GITHUB_REPOSITORY}/rulesets/${RULESET_ID}" \
            --input .github/rulesets/main-branch.json

      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: actions/setup-go@v5
        with:
          go-version-file: operator/go.mod

      - name: Install engine and semantic-release
        working-directory: engine
        run: |
          uv sync --extra dev --frozen
          uv pip install "python-semantic-release~=10.0"

      - name: Run engine tests
        working-directory: engine
        run: uv run pytest

      - name: Run operator tests
        working-directory: operator
        run: make test

      - name: Create GitHub release on conventional commits
        env:
          GH_TOKEN: ${{ secrets.REPAVE_RELEASE_TOKEN }}
          RELEASE_TOKEN: ${{ secrets.REPAVE_RELEASE_TOKEN }}
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git remote set-url origin "https://x-access-token:${RELEASE_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"

          BYPASS="$(gh api "repos/${GITHUB_REPOSITORY}/rulesets/19653825" --jq '.current_user_can_bypass')"
          if [ "${BYPASS}" != "always" ]; then
            echo "::error::REPAVE_RELEASE_TOKEN cannot bypass the main branch ruleset. Use an Administrator classic PAT."
            exit 1
          fi

          cd engine
          uv run semantic-release version
