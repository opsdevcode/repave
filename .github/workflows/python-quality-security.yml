name: Python Quality and Security

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  quality:
    name: Code quality (Ruff + mypy)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: engine
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install engine and quality tools
        run: uv sync --extra dev --frozen

      - name: Ruff lint
        run: uv run ruff check src tests

      - name: Ruff format
        run: uv run ruff format --check src tests

      - name: mypy
        run: uv run mypy src

  security:
    name: Security (Bandit + pip-audit)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: engine
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install engine and security tools
        run: uv sync --extra dev --frozen

      - name: Bandit (Python SAST)
        run: uv run bandit -r src -c pyproject.toml

      - name: pip-audit (dependency vulnerabilities)
        run: uv run pip-audit
