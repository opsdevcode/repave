name: Conventional Commits

on:
  pull_request:
    types:
      - opened
      - edited
      - synchronize
      - reopened

permissions:
  contents: read
  pull-requests: read

jobs:
  semantic-pull-request:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/ci-paths
        id: paths

      - name: Docs-only change (skip PR title lint)
        if: steps.paths.outputs.ci_needed != 'true'
        run: echo "No code changes outside docs-only paths; skipping semantic PR check."

      - uses: amannn/action-semantic-pull-request@v5
        if: steps.paths.outputs.ci_needed == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          types: |
            feat
            fix
            docs
            style
            refactor
            perf
            test
            build
            ci
            chore
            revert
          requireScope: false
          subjectPattern: ^(?![A-Z]).+$
          subjectPatternError: |
            The subject must not start with an uppercase character.

  commitlint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: ./.github/actions/ci-paths
        id: paths

      - name: Docs-only change (skip commitlint)
        if: steps.paths.outputs.ci_needed != 'true'
        run: echo "No code changes outside docs-only paths; skipping commitlint."

      - uses: wagoid/commitlint-github-action@v6
        if: steps.paths.outputs.ci_needed == 'true'
        with:
          configFile: .github/commitlint.config.mjs
